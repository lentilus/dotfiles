<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Searx Results — retro + relative line numbers</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{height:100%; margin:0; padding:0; font:14px/1.3 "Verdana","Arial",sans-serif; background:#ffffff; color:#000;}
    #results{ list-style:none; margin:0; padding:0; border-top:1px solid #ccc; border-bottom:1px solid #ccc; max-height:100vh; overflow-y:auto; outline:none; }
    .result{ padding:8px 10px; border-bottom:1px solid #ddd; cursor:pointer; background:#fff; white-space:nowrap; overflow:hidden; }
    .result:hover{ background:#e6e6e6; }
    .result[aria-selected="true"]{ background:#cce1ff; }
    .row{ display:block; zoom:1; }
    .ln { display:inline-block; width:32px; text-align:right; margin-right:8px; font-family: "Courier New", Courier, monospace; color:#333; font-size:12px; vertical-align:top; }
    .favicon-slot{ width:16px; height:16px; display:inline-block; vertical-align:top; margin-right:6px; }
    .favicon{ width:16px; height:16px; display:inline-block; }
    .favicon-placeholder{ width:14px; height:14px; display:inline-block; background:#ddd; font-size:9px; text-align:center; color:#555; vertical-align:middle; }
    .content{ display:inline-block; vertical-align:top; width:72%; max-width:72%; }
    .title{ font-size:14px; margin:0 0 2px 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .title a{ color:#0000ee; text-decoration:underline; }
    .title a:visited{ color:#551a8b; }
    .url{ font-size:11px; color:#006600; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .snippet{ font-size:11px; color:#444; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .result ::selection { background: rgba(26,115,232,0.12); }
  </style>
</head>
<body>
  <ul id="results" role="listbox" aria-label="Search results" tabindex="0"></ul>

  <script>
  (function () {
    var SEARX_BASE = 'http://localhost:2987';

    // helpers
    function on(el, ev, fn) {
      if (!el) return;
      if (el.addEventListener) el.addEventListener(ev, fn, false);
      else if (el.attachEvent) el.attachEvent('on' + ev, function () { fn.call(el, window.event); });
    }
    function setText(el, s) { if (!el) return; if ('textContent' in el) el.textContent = s; else el.innerText = s; }
    function closestOption(node) {
      while (node && node !== document) {
        if (node.getAttribute && node.getAttribute('role') === 'option') return node;
        node = node.parentNode;
      }
      return null;
    }
    function hostnameFromUrl(u) {
      if (!u) return '';
      var a = document.createElement('a');
      a.href = u;
      return a.hostname || a.host || '';
    }
    function getQueryParam(name) {
      var q = (location.search || '').replace(/^\?/, '');
      if (!q) return null;
      var pairs = q.split('&'), i;
      for (i = 0; i < pairs.length; i++) {
        var kv = pairs[i].split('=');
        if (!kv[0]) continue;
        if (decodeURIComponent(kv[0]) === name) return decodeURIComponent(kv[1] || '');
      }
      return null;
    }
    function getJSONSync(url) {
      var xhr = new XMLHttpRequest();
      try { xhr.open('GET', url, false); xhr.send(null);
        if (xhr.status >= 200 && xhr.status < 300) return { json: JSON.parse(xhr.responseText), url: url };
      } catch (e) {}
      return null;
    }
    function normalize(j) {
      if (!j) return [];
      if (Object.prototype.toString.call(j) === '[object Array]') return j;
      if (Object.prototype.toString.call(j.results) === '[object Array]') return j.results;
      if (Object.prototype.toString.call(j.items) === '[object Array]') return j.items;
      for (var k in j) if (Object.prototype.hasOwnProperty.call(j,k) && Object.prototype.toString.call(j[k]) === '[object Array]') return j[k];
      return [];
    }

    var list = document.getElementById('results');
    var q = getQueryParam('q');
    if (!q) {
      var li = document.createElement('li');
      li.className = 'result';
      li.appendChild(document.createTextNode('Pass a query as ?q=your+terms'));
      list.appendChild(li);
      try { list.setAttribute('aria-disabled','true'); } catch(e){}
      on(window, 'load', function(){ try{ list.focus(); }catch(e){} });
      return;
    }

    var base = SEARX_BASE.replace(/\/$/, '');
    var urls = [
      base + '/search?q=' + encodeURIComponent(q) + '&format=json',
      base + '/search.json?q=' + encodeURIComponent(q)
    ];
    var found = null;
    for (var i = 0; i < urls.length; i++) { found = getJSONSync(urls[i]); if (found) break; }

    var optionEls = [], activeIndex = -1;
    function syncOptions() {
      optionEls = [];
      var kids = list.getElementsByTagName('li');
      for (var j = 0; j < kids.length; j++) {
        if (kids[j].getAttribute && kids[j].getAttribute('role') === 'option') optionEls.push(kids[j]);
      }
    }
    function updateLineNumbers() {
      syncOptions();
      for (var i = 0; i < optionEls.length; i++) {
        // find the .ln span inside this li
        var spans = optionEls[i].getElementsByTagName('span');
        for (var s = 0; s < spans.length; s++) {
          var cn = ' ' + (spans[s].className || '') + ' ';
          if (cn.indexOf(' ln ') !== -1 || cn.indexOf(' ln') !== -1 || cn.indexOf('ln ') !== -1) {
            var val = (activeIndex >= 0) ? Math.abs(i - activeIndex) : Math.abs(i - 0);
            setText(spans[s], String(val));
            break;
          }
        }
      }
    }
    function setActive(idx) {
      if (!optionEls.length) return;
      if (idx < 0) idx = 0;
      if (idx > optionEls.length - 1) idx = optionEls.length - 1;
      if (activeIndex === idx) return;
      if (activeIndex >= 0 && optionEls[activeIndex]) optionEls[activeIndex].removeAttribute('aria-selected');
      activeIndex = idx;
      var el = optionEls[idx];
      if (!el) return;
      el.setAttribute('aria-selected','true');
      try { list.setAttribute('aria-activedescendant', el.id); } catch(e){}
      if (el.scrollIntoView) { try { el.scrollIntoView(false); } catch(e){} }
      try { sessionStorage.setItem('lastActive', String(idx)); } catch(e){}
      updateLineNumbers();
    }

    function duckduckgoFavicon(domain) { return 'https://icons.duckduckgo.com/ip3/' + domain + '.ico'; }
    function safeText(s){ return (s || '').replace(/<[^>]+>/g,''); }

    function appendResult(r, idx) {
      var li = document.createElement('li');
      li.className = 'result';
      li.setAttribute('role','option');
      li.id = 'opt-' + idx;
      li.tabIndex = -1;
      var url = r.url || r.link || r.uri || '';

      var row = document.createElement('div'); row.className = 'row';

      // relative number column
      var ln = document.createElement('span'); ln.className = 'ln'; setText(ln, String(idx)); // initial set; updated later
      row.appendChild(ln);

      // favicon slot
      var slot = document.createElement('span'); slot.className = 'favicon-slot';
      var placeholder = document.createElement('span'); placeholder.className = 'favicon-placeholder';
      placeholder.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24"><path fill="#c5cbd3" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg>';
      slot.appendChild(placeholder);

      var img = document.createElement('img');
      img.className = 'favicon'; img.alt = '';
      var hostname = '';
      try { hostname = hostnameFromUrl(url); } catch(e) { hostname = ''; }
      if (hostname) {
        img.src = duckduckgoFavicon(hostname);
        img.onload = function () { try { placeholder.style.display = 'none'; img.style.display = 'inline-block'; } catch(e){} };
        img.onerror = function () { try { img.style.display = 'none'; } catch(e){} };
      } else { try { img.style.display = 'none'; } catch(e){} }

      // content
      var content = document.createElement('div'); content.className = 'content';
      var t = document.createElement('div'); t.className = 'title';
      var a = document.createElement('a'); a.href = url || '#';
      a.appendChild(document.createTextNode(r.title || r.title_plain || r.name || ('Result ' + (idx + 1))));
      t.appendChild(a);
      content.appendChild(t);

      if (url) {
        var u = document.createElement('div'); u.className = 'url'; u.appendChild(document.createTextNode(url));
        content.appendChild(u);
        try { li.dataset = li.dataset || {}; li.dataset.url = url; } catch(e){ li.setAttribute('data-url', url); }
      }

      var s = document.createElement('div'); s.className = 'snippet'; s.appendChild(document.createTextNode(safeText(r.content || r.snippet || r.description || '')));
      content.appendChild(s);

      slot.appendChild(img);
      row.appendChild(slot);
      row.appendChild(content);
      li.appendChild(row);
      list.appendChild(li);
    }

    if (!found) {
      var liNo = document.createElement('li'); liNo.className = 'result'; liNo.appendChild(document.createTextNode('No JSON endpoint reachable. Check Searx and CORS'));
      list.appendChild(liNo); try { list.setAttribute('aria-disabled','true'); } catch(e){}
    } else {
      var arr = normalize(found.json);
      if (!arr || arr.length === 0) {
        var liEmpty = document.createElement('li'); liEmpty.className = 'result'; liEmpty.appendChild(document.createTextNode('No results'));
        list.appendChild(liEmpty); try { list.setAttribute('aria-disabled','true'); } catch(e){}
      } else {
        for (var m = 0; m < arr.length; m++) appendResult(arr[m], m);
        syncOptions();
        var restore = null;
        try { restore = parseInt(sessionStorage.getItem('lastActive'), 10); } catch(e){}
        if (!isNaN(restore) && restore >= 0 && restore < optionEls.length) setActive(restore); else setActive(0);
      }
    }

    // keyboard navigation (old-key support)
    on(list, 'keydown', function (ev) {
      ev = ev || window.event;
      if (!optionEls || !optionEls.length) return;
      var handled = false;
      var code = ev.keyCode || ev.which;
      switch (code) {
        case 40: setActive(activeIndex + 1); handled = true; break; // down
        case 38: setActive(activeIndex - 1); handled = true; break; // up
        case 36: setActive(0); handled = true; break; // home
        case 35: setActive(optionEls.length - 1); handled = true; break; // end
        case 34: setActive(activeIndex + 10); handled = true; break; // pgdn
        case 33: setActive(activeIndex - 10); handled = true; break; // pgup
        case 13:
          var el = optionEls[activeIndex];
          if (el) {
            var anchors = el.getElementsByTagName('a');
            if (anchors && anchors.length && anchors[0].href && anchors[0].href !== '#') location.href = anchors[0].href;
            else {
              var urlAttr = (el.getAttribute && (el.getAttribute('data-url') || (el.dataset && el.dataset.url))) || '';
              if (urlAttr) location.href = urlAttr;
            }
          }
          handled = true;
          break;
      }
      if (handled) {
        if (ev.preventDefault) ev.preventDefault(); ev.returnValue = false;
        if (ev.stopPropagation) ev.stopPropagation();
      }
    });

    on(list, 'click', function (ev) {
      ev = ev || window.event;
      var target = ev.target || ev.srcElement;
      var li = closestOption(target);
      if (!li) return;
      syncOptions();
      var idx = -1;
      for (var n = 0; n < optionEls.length; n++) if (optionEls[n] === li) { idx = n; break; }
      if (idx === -1) return;
      if (idx === activeIndex) {
        var anchors = li.getElementsByTagName('a');
        if (anchors && anchors.length && anchors[0].href && anchors[0].href !== '#') location.href = anchors[0].href;
        else {
          var urlAttr = (li.getAttribute && (li.getAttribute('data-url') || (li.dataset && li.dataset.url))) || '';
          if (urlAttr) location.href = urlAttr;
        }
      } else setActive(idx);
    });

    on(list, 'dblclick', function (ev) {
      ev = ev || window.event;
      var target = ev.target || ev.srcElement;
      var li = closestOption(target); if (!li) return;
      var anchors = li.getElementsByTagName('a');
      if (anchors && anchors.length && anchors[0].href && anchors[0].href !== '#') location.href = anchors[0].href;
      else {
        var urlAttr = (li.getAttribute && (li.getAttribute('data-url') || (li.dataset && li.dataset.url))) || '';
        if (urlAttr) location.href = urlAttr;
      }
    });

    on(window, 'pageshow', function () {
      syncOptions(); clearAllSelected(); activeIndex = -1;
      var restore = null;
      try { restore = parseInt(sessionStorage.getItem('lastActive'), 10); } catch(e){}
      if (!isNaN(restore) && restore >= 0 && restore < optionEls.length) setActive(restore);
      else if (optionEls.length) setActive(0);
      try { list.focus(); } catch(e){}
      try { if (window.getSelection) window.getSelection().removeAllRanges(); } catch(e){}
    });

    on(window, 'load', function(){ try{ list.focus(); }catch(e){} });

    // helper used in pageshow handler
    function clearAllSelected() { for (var i=0;i<optionEls.length;i++) optionEls[i].removeAttribute('aria-selected'); }

  }());
  </script>
</body>
</html>
